services:
  postgres:
    image: postgres:16
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-vibe_trading}
      - POSTGRES_USER=${POSTGRES_USER:-vibe}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-vibe_dev_password}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - ${VIBE_DATA_ROOT:-/Users/pengying/workspace/ai-finance-os/vibe-data}/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vibe} -d ${POSTGRES_DB:-vibe_trading}"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  vibe-trading:
    build: .
    ports:
      - "127.0.0.1:8899:8899"
      - "127.0.0.1:${VIBE_MCP_PORT:-8900}:${VIBE_MCP_PORT:-8900}"
    env_file:
      - agent/.env
    environment:
      - VIBE_TRADING_TRUST_DOCKER_LOOPBACK=1
      - DATABASE_URL=${DATABASE_URL:-postgresql+psycopg://vibe:vibe_dev_password@postgres:5432/vibe_trading}
      # Ollama runs on the host; from inside the container "localhost" is the
      # container itself, so default to reaching the host via host.docker.internal.
      # Override by exporting OLLAMA_BASE_URL (or setting it in a top-level .env)
      # when Ollama runs elsewhere or on a different port.
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
    extra_hosts:
      # Maps host.docker.internal -> host gateway (needed on Linux; harmless on Docker Desktop).
      # Requires Docker Engine >= 20.10 / Compose v2 (host-gateway support).
      - "host.docker.internal:host-gateway"
    volumes:
      - ${VIBE_DATA_ROOT:-/Users/pengying/workspace/ai-finance-os/vibe-data}/runs:/app/agent/runs
      - ${VIBE_DATA_ROOT:-/Users/pengying/workspace/ai-finance-os/vibe-data}/sessions:/app/agent/sessions
      # User-level agent state: persistent memory, cross-session search index
      # (sessions.db), user-created skills, shadow accounts, hypothesis
      # registry, broker connector config, agent.json. Without this volume a
      # rebuild/recreate wipes it all (#197).
      - ${VIBE_DATA_ROOT:-/Users/pengying/workspace/ai-finance-os/vibe-data}/home:/home/vibe/.vibe-trading
      - ${VIBE_DATA_ROOT:-/Users/pengying/workspace/ai-finance-os/vibe-data}/swarm-runs:/app/agent/.swarm/runs
      - ${VIBE_DATA_ROOT:-/Users/pengying/workspace/ai-finance-os/vibe-data}/uploads:/app/agent/uploads
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    image: node:20
    working_dir: /app
    ports:
      - "5899:5899"
    volumes:
      - ./frontend:/app
    environment:
      - VITE_API_URL=http://vibe-trading:8899
    command: sh -c "npm install && npm run dev -- --host --port 5899"
    profiles:
      - frontend
    depends_on:
      vibe-trading:
        condition: service_started
